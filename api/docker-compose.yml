version: "3.8"

services:
  oracle-backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      # prompt.txt optionnel — sinon utiliser SYSTEM_PROMPT dans .env
      - ./config/prompt.txt:/app/config/prompt.txt:ro
      # Persistance des sessions et des données
      - ./storage:/app/storage
      - ./data:/app/data
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1