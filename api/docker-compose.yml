version: "3.8"

services:
  oracle-backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./config/prompt.txt:/app/config/prompt.txt:ro
      - ./storage:/app/storage
      - ./data:/app/data
      - ./logs:/app/logs
      - huggingface-cache:/root/.cache/huggingface
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1

volumes:
  huggingface-cache: