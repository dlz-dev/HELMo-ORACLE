services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./config/prompt.txt:/app/config/prompt.txt:ro
      - ./config/prompt_context.txt:/app/config/prompt_context.txt:ro
      - ./config/prompt_guardian.txt:/app/config/prompt_guardian.txt:ro
      - ./config/prompt_summary.txt:/app/config/prompt_summary.txt:ro
      - ./storage:/app/storage
      - ./data:/app/data
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - OLLAMA_BASE_URL=http://embedding_service:11434
    depends_on:
      embedding_service:
        condition: service_started
      embedding_init:
        condition: service_completed_successfully

  embedding_service:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_data:/root/.ollama
    restart: unless-stopped

  embedding_init:
    image: ollama/ollama:latest
    depends_on:
      embedding_service:
        condition: service_started
    environment:
      - OLLAMA_HOST=http://embedding_service:11434
    command: pull nomic-embed-text

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data

  bot:
    build:
      context: ../bot
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      - redis
    environment:
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - DISCORD_TOKEN=${DISCORD_BOT_TOKEN}
      - DISCORD_PUBLIC_KEY=${DISCORD_PUBLIC_KEY}
      - DISCORD_APPLICATION_ID=${DISCORD_APPLICATION_ID}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - NUXT_GROQ_API_KEY=${GROQ_API_KEY}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - MCP_SERVER_URL=${MCP_SERVER_URL}
      - NUXT_MCP_SERVER_URL=${MCP_SERVER_URL}

  dashboard:
    build:
      context: ../dashboard
      dockerfile: Dockerfile
    ports:
      - "8050:8050"
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      - API_URL=http://backend:8000

  db:
    profiles: ["db"]
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: oracle
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./config/schema_server.sql:/docker-entrypoint-initdb.d/schema_server.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d oracle"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  redisdata: