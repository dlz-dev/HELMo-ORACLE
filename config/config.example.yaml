# ─────────────────────────────────────────────────────────────────
# INSTRUCTIONS:
# 1. Copy this file to "config.yaml"
# 2. Replace the placeholder values (e.g., "your_api_key") with your actual data.
# ─────────────────────────────────────────────────────────────────

# ─────────────────────────────────────────────────────────────────
# Database (Supabase / PostgreSQL)
# ─────────────────────────────────────────────────────────────────
database:
  dbname: "postgres"
  user: "postgres"
  password: "your_database_password"
  host: "db.projectref.supabase.co" # or localhost
  port: 6543 # or 5432
  # Construct the string: postgresql://USER:PASSWORD@HOST:PORT/DBNAME
  connection_string: "postgresql://postgres:password@db.projectref.supabase.co:6543/postgres"

# ─────────────────────────────────────────────────────────────────
# LLM Configuration
# ─────────────────────────────────────────────────────────────────
llm:
  default_provider: "groq" # Options: groq, openai, anthropic, gemini, ollama
  default_model: "llama-3.3-70b-versatile"
  temperature: 0

  # ── Cloud providers ─────────────────────────────────────────────

  groq:
    api_key: "gsk_your_groq_api_key"
    # Optional: override the default model list shown in sidebar
    # models:
    #   - "llama-3.3-70b-versatile"
    #   - "mixtral-8x7b-32768"

  openai:
    api_key: "sk-your_openai_api_key"
    # models:
    #   - "gpt-4o"
    #   - "gpt-4o-mini"

  anthropic:
    api_key: "sk-ant-your_anthropic_api_key"
    # models:
    #   - "claude-3-5-sonnet-20240620"
    #   - "claude-3-haiku-20240307"

  gemini:
    api_key: "your_gemini_api_key"
    # models:
    #   - "gemini-2.0-flash"
    #   - "gemini-1.5-pro"

  # ── Local provider ───────────────────────────────────────────────
  ollama:
    base_url: "http://localhost:11434"
    # List the models you have pulled locally with `ollama pull <model>`
    models:
      - "llama3.1"
      - "mistral"

# ─────────────────────────────────────────────────────────────────
# Guardian Configuration — LLM used to validate lore files at ingestion
# ─────────────────────────────────────────────────────────────────
guardian:
  # Provider used by the Guardian (can differ from the Oracle's provider).
  # Tip: use a fast/cheap model — classification doesn't need a powerful LLM.
  provider: "groq"

  # Recommended: small & fast models work well for binary classification.
  #   groq    → "gemma2-9b-it" | "llama-3.1-8b-instant"
  #   ollama  → "gemma3:12b"   | "mistral"
  #   openai  → "gpt-4o-mini"
  #   gemini  → "gemini-2.0-flash-lite"
  model: "llama-3.1-8b-instant"

# ─────────────────────────────────────────────────────────────────
# Memory Configuration
# ─────────────────────────────────────────────────────────────────
memory:
  # Token budget for recent messages passed verbatim to the agent.
  # When exceeded, oldest messages are summarized automatically.
  # Formula: max_recent = total_limit - system_prompt - tool_results_overhead
  max_recent_tokens: 1200

  # Minimum number of recent messages to ALWAYS keep intact,
  # even if the token budget is exceeded. Prevents over-summarization.
  min_recent_messages: 4

# ─────────────────────────────────────────────────────────────────
# Search Configuration — Hybrid Semantic + BM25 + RRF
# ─────────────────────────────────────────────────────────────────
search:
  # Number of candidate results fetched from each search method
  # before fusion. Higher = better recall, slower query.
  k_semantic: 10 # candidates from cosine semantic search
  k_bm25: 10 # candidates from BM25 full-text search

  # Final number of results returned to the Oracle after RRF fusion.
  # 5 is a good balance — enough context without token overload.
  k_final: 5

  # RRF constant (standard value: 60).
  # Lower = top results dominate more strongly.
  # Higher = more democratic ranking across all candidates.
  rrf_k: 60

  # PostgreSQL full-text search language for BM25 stemming.
  # 'french' handles French stemming (Dofus content is in French).
  # Use 'simple' if your content mixes multiple languages.
  fts_language: "french"

# ─────────────────────────────────────────────────────────────────
# Semantic Cache Configuration
# ─────────────────────────────────────────────────────────────────
cache:
  # Cosine similarity threshold for a cache hit (0.0 to 1.0).
  # 0.92 = very strict — only near-identical questions hit the cache.
  # 0.88 = moderate — catches more reformulations, slight risk of wrong hits.
  # Recommended: start at 0.92, lower if hit rate is too low.
  similarity_threshold: 0.92

  # Number of days before a cache entry expires.
  # After a re-ingestion, call cache.invalidate() to clear stale answers.
  ttl_days: 30

  # Maximum number of entries to keep in the local cache file.
  # Oldest (by last_hit_at) entries are evicted when exceeded.
  max_entries: 500