# config.example.yaml  ← copy this to config.yaml and fill in your values
# ─────────────────────────────────────────────────────────────────
# Database (Supabase / PostgreSQL)
# ─────────────────────────────────────────────────────────────────
database:
  dbname: "database_name"
  user: "user_name"
  password: "password"
  host: "host_database"
  port: 6543
  connection_string: "postgresql://user:password@host:port/dbname"

# ─────────────────────────────────────────────────────────────────
# LLM Configuration
# ─────────────────────────────────────────────────────────────────
llm:
  default_provider: "groq"       # groq | openai | anthropic | gemini | ollama
  default_model: "llama-3.3-70b-versatile"
  temperature: 0

  groq:
    api_key: "your_groq_api_key"
    # Optional: override the default model list shown in sidebar
    # models:
    #   - "llama-3.3-70b-versatile"
    #   - "mixtral-8x7b-32768"

  openai:
    api_key: "your_openai_api_key"
    # models:
    #   - "gpt-4o"
    #   - "gpt-4o-mini"

  anthropic:
    api_key: "your_anthropic_api_key"
    # models:
    #   - "claude-sonnet-4-5"
    #   - "claude-haiku-4-5"

  gemini:
    api_key: "your_google_api_key"
    # models:
    #   - "gemini-2.0-flash"
    #   - "gemini-1.5-pro"

  ollama:
    base_url: "http://localhost:11434"
    models:
      - "llama3.1"
      - "mistral"