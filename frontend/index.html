<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔮 HELMo Oracle</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0f0f1a;
      --sidebar:     #1a1a2e;
      --card:        #16213e;
      --accent:      #7c3aed;
      --accent-h:    #6d28d9;
      --text:        #e2e8f0;
      --muted:       #94a3b8;
      --border:      #2d3748;
      --user-bg:     #2d1b69;
      --bot-bg:      #1e2a3a;
      --input-bg:    #1e2a3a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 250px;
      min-width: 250px;
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 1rem;
    }
    #sidebar h1 { font-size: 1.15rem; font-weight: 700; color: var(--accent); }
    #sidebar .sub { font-size: 0.72rem; color: var(--muted); margin-bottom: 1rem; }
    #sessions-list { flex: 1; overflow-y: auto; margin-top: 0.75rem; }
    .session-item {
      padding: 0.55rem 0.65rem;
      border-radius: 7px;
      cursor: pointer;
      margin-bottom: 0.3rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.81rem;
      color: var(--muted);
      border: 1px solid transparent;
      gap: 4px;
    }
    .session-item:hover { background: var(--card); color: var(--text); }
    .session-item.active { background: var(--card); color: var(--text); border-color: var(--accent); }
    .session-item span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .del-btn {
      opacity: 0;
      background: none;
      border: none;
      color: #ef4444;
      cursor: pointer;
      font-size: 0.9rem;
      flex-shrink: 0;
      padding: 0 2px;
    }
    .session-item:hover .del-btn { opacity: 1; }
    #sidebar-footer { padding-top: 0.75rem; border-top: 1px solid var(--border); }
    .link-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 0.79rem;
      cursor: pointer;
      text-decoration: underline;
    }
    .link-btn:hover { color: var(--text); }

    /* ── Main ── */
    #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    #chat-header {
      padding: 0.85rem 1.25rem;
      border-bottom: 1px solid var(--border);
      background: var(--sidebar);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    #chat-title { font-size: 0.97rem; font-weight: 600; }
    #chat-sub   { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
    }
    .msg { max-width: 78%; }
    .msg.user      { align-self: flex-end; }
    .msg.assistant { align-self: flex-start; }
    .bubble {
      padding: 0.7rem 0.95rem;
      border-radius: 12px;
      font-size: 0.88rem;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .user .bubble      { background: var(--user-bg); border-radius: 12px 12px 2px 12px; }
    .assistant .bubble { background: var(--bot-bg);  border-radius: 12px 12px 12px 2px; }
    .typing { color: var(--muted); font-style: italic; }

    /* CoT */
    .cot-toggle {
      margin-top: 0.35rem;
      font-size: 0.73rem;
      color: var(--muted);
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.2rem 0.45rem;
      cursor: pointer;
    }
    .cot-toggle:hover { color: var(--text); }
    .cot-panel {
      display: none;
      margin-top: 0.4rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.65rem 0.75rem;
      font-size: 0.78rem;
      color: var(--muted);
    }
    .cot-panel.open { display: block; }
    .cot-src { padding-bottom: 0.5rem; margin-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
    .cot-src:last-child { padding-bottom: 0; margin-bottom: 0; border-bottom: none; }
    .conf-high   { color: #34d399; }
    .conf-medium { color: #fbbf24; }
    .conf-low    { color: #f87171; }

    /* Welcome */
    #welcome { text-align: center; padding: 2.5rem 1.5rem; color: var(--muted); }
    #welcome h2 { color: var(--text); font-size: 1.35rem; margin-bottom: 0.4rem; }
    #welcome p  { margin-bottom: 1.25rem; font-size: 0.88rem; }
    .starters { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.45rem; max-width: 580px; margin: 0 auto; }
    .starter {
      padding: 0.55rem 0.6rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.8rem;
      cursor: pointer;
      text-align: left;
    }
    .starter:hover { border-color: var(--accent); }

    /* Input */
    #input-area {
      padding: 0.85rem 1.25rem;
      border-top: 1px solid var(--border);
      background: var(--sidebar);
    }
    #input-row { display: flex; gap: 0.5rem; }
    #msg-input {
      flex: 1;
      padding: 0.65rem 0.9rem;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 0.88rem;
      resize: none;
      outline: none;
      font-family: inherit;
      max-height: 120px;
    }
    #msg-input:focus { border-color: var(--accent); }
    #send-btn {
      padding: 0.65rem 1.1rem;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 1.05rem;
    }
    #send-btn:hover    { background: var(--accent-h); }
    #send-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* Buttons */
    .btn { padding: 0.45rem 0.7rem; border-radius: 7px; border: none; cursor: pointer; font-size: 0.82rem; transition: background 0.15s; }
    .btn-primary { background: var(--accent); color: white; width: 100%; }
    .btn-primary:hover { background: var(--accent-h); }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--card); color: var(--text); }

    /* Modal */
    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #overlay.open { display: flex; }
    #modal {
      background: var(--sidebar);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.4rem;
      width: 420px;
      max-width: 92vw;
    }
    #modal h2 { margin-bottom: 1rem; font-size: 1.05rem; }
    .fg { margin-bottom: 0.85rem; }
    .fg label { display: block; font-size: 0.79rem; color: var(--muted); margin-bottom: 0.3rem; }
    .fg input, .fg select {
      width: 100%;
      padding: 0.45rem 0.7rem;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.85rem;
      outline: none;
    }
    .fg input:focus, .fg select:focus { border-color: var(--accent); }
    .fg input[type="range"] { padding: 0; }
    .fg-row { display: flex; gap: 0.65rem; }
    .fg-row .fg { flex: 1; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 0.5rem; margin-top: 1.1rem; }

    /* Scrollbar */
    ::-webkit-scrollbar       { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    @media (max-width: 580px) {
      #sidebar { display: none; }
      .starters { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<!-- ── Sidebar ─────────────────────────────────────────────── -->
<div id="sidebar">
  <h1>🔮 HELMo Oracle</h1>
  <p class="sub">Archives Sacrées de Dofus</p>

  <button class="btn btn-primary" onclick="newSession()">✨ Nouvelle session</button>

  <div id="sessions-list"></div>

  <div id="sidebar-footer">
    <button class="link-btn" onclick="openSettings()">⚙️ Paramètres</button>
  </div>
</div>

<!-- ── Main ────────────────────────────────────────────────── -->
<div id="main">
  <div id="chat-header">
    <div>
      <div id="chat-title">🔮 The Sacred Oracle</div>
      <div id="chat-sub"></div>
    </div>
    <button class="btn btn-ghost" onclick="openSettings()" style="font-size:0.78rem">⚙️ Paramètres</button>
  </div>

  <div id="messages"></div>

  <div id="input-area">
    <div id="input-row">
      <textarea id="msg-input" rows="1"
        placeholder="Posez votre question aux archives sacrées…"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button id="send-btn" onclick="send()">➤</button>
    </div>
  </div>
</div>

<!-- ── Settings modal ──────────────────────────────────────── -->
<div id="overlay" onclick="overlayClick(event)">
  <div id="modal">
    <h2>⚙️ Paramètres</h2>

    <div class="fg">
      <label>URL du backend (VPS)</label>
      <input id="cfg-url" type="text" placeholder="https://votre-vps.com:8000">
    </div>

    <div class="fg-row">
      <div class="fg">
        <label>Provider</label>
        <select id="cfg-provider" onchange="loadModels()"></select>
      </div>
      <div class="fg">
        <label>Modèle</label>
        <select id="cfg-model"></select>
      </div>
    </div>

    <div class="fg">
      <label>Température : <span id="temp-lbl">0.00</span></label>
      <input id="cfg-temp" type="range" min="0" max="1" step="0.05" value="0"
        oninput="document.getElementById('temp-lbl').textContent = parseFloat(this.value).toFixed(2)">
    </div>

    <div class="fg">
      <label>Sources (K) : <span id="k-lbl">5</span></label>
      <input id="cfg-k" type="range" min="1" max="15" step="1" value="5"
        oninput="document.getElementById('k-lbl').textContent = this.value">
    </div>

    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeSettings()">Annuler</button>
      <button class="btn btn-primary" onclick="saveSettings()">Sauvegarder</button>
    </div>
  </div>
</div>

<script>
// ── Config (persisted in localStorage) ──────────────────────────────────────
const LS = {
  url:   'oracle_url',
  prov:  'oracle_provider',
  model: 'oracle_model',
  temp:  'oracle_temp',
  k:     'oracle_k',
};

let cfg = {
  url:   localStorage.getItem(LS.url)   || 'https://api.dlzteam.com',
  prov:  localStorage.getItem(LS.prov)  || 'groq',
  model: localStorage.getItem(LS.model) || '',
  temp:  parseFloat(localStorage.getItem(LS.temp) || '0'),
  k:     parseInt(localStorage.getItem(LS.k) || '5'),
};

let currentSid = null;
let busy = false;

// ── Boot ─────────────────────────────────────────────────────────────────────
async function boot() {
  updateSub();
  await refreshSessions();
  showWelcome();
}

function updateSub() {
  document.getElementById('chat-sub').textContent =
    `${cfg.prov} · ${cfg.model || 'modèle par défaut'}`;
}

// ── Settings ─────────────────────────────────────────────────────────────────
async function openSettings() {
  document.getElementById('cfg-url').value  = cfg.url;
  document.getElementById('cfg-temp').value = cfg.temp;
  document.getElementById('cfg-k').value    = cfg.k;
  document.getElementById('temp-lbl').textContent = cfg.temp.toFixed(2);
  document.getElementById('k-lbl').textContent    = cfg.k;

  // Load providers from backend
  const sel = document.getElementById('cfg-provider');
  sel.innerHTML = '';
  try {
    const r = await fetch(`${cfg.url}/providers`);
    const d = await r.json();
    for (const [key, label] of Object.entries(d.providers)) {
      const o = document.createElement('option');
      o.value = key; o.textContent = label;
      if (key === cfg.prov) o.selected = true;
      sel.appendChild(o);
    }
  } catch {
    sel.innerHTML = `<option value="${cfg.prov}">${cfg.prov}</option>`;
  }
  await loadModels();
  document.getElementById('overlay').classList.add('open');
}

async function loadModels() {
  const prov   = document.getElementById('cfg-provider').value;
  const apiUrl = document.getElementById('cfg-url').value;
  const sel    = document.getElementById('cfg-model');
  sel.innerHTML = '<option>Chargement…</option>';
  try {
    const r = await fetch(`${apiUrl}/providers/${prov}/models`);
    const d = await r.json();
    sel.innerHTML = '';
    for (const m of d.models) {
      const o = document.createElement('option');
      o.value = m; o.textContent = m;
      if (m === cfg.model) o.selected = true;
      sel.appendChild(o);
    }
  } catch {
    sel.innerHTML = `<option value="${cfg.model}">${cfg.model || 'défaut'}</option>`;
  }
}

function saveSettings() {
  cfg.url   = document.getElementById('cfg-url').value.replace(/\/$/, '');
  cfg.prov  = document.getElementById('cfg-provider').value;
  cfg.model = document.getElementById('cfg-model').value;
  cfg.temp  = parseFloat(document.getElementById('cfg-temp').value);
  cfg.k     = parseInt(document.getElementById('cfg-k').value);
  localStorage.setItem(LS.url,   cfg.url);
  localStorage.setItem(LS.prov,  cfg.prov);
  localStorage.setItem(LS.model, cfg.model);
  localStorage.setItem(LS.temp,  cfg.temp);
  localStorage.setItem(LS.k,     cfg.k);
  updateSub();
  closeSettings();
}

function closeSettings() {
  document.getElementById('overlay').classList.remove('open');
}

function overlayClick(e) {
  if (e.target === document.getElementById('overlay')) closeSettings();
}

// ── Sessions ─────────────────────────────────────────────────────────────────
async function refreshSessions() {
  try {
    const r = await fetch(`${cfg.url}/sessions`);
    const d = await r.json();
    renderSessions(d.sessions);
  } catch {
    document.getElementById('sessions-list').innerHTML =
      '<p style="color:var(--muted);font-size:0.76rem;padding:0.4rem 0">Backend inaccessible</p>';
  }
}

function renderSessions(list) {
  const el = document.getElementById('sessions-list');
  if (!list || list.length === 0) {
    el.innerHTML = '<p style="color:var(--muted);font-size:0.76rem;padding:0.4rem 0">Aucune session</p>';
    return;
  }
  el.innerHTML = list.map(s => `
    <div class="session-item ${s.session_id === currentSid ? 'active' : ''}"
         onclick="loadSession('${s.session_id}')">
      <span>${esc(s.title || 'Sans titre')}</span>
      <button class="del-btn" onclick="deleteSession(event,'${s.session_id}')" title="Supprimer">✕</button>
    </div>
  `).join('');
}

async function newSession() {
  currentSid = null;
  showWelcome();
  document.getElementById('chat-title').textContent = '🔮 The Sacred Oracle';
  await refreshSessions();
}

async function loadSession(sid) {
  try {
    const r = await fetch(`${cfg.url}/sessions/${sid}`);
    if (!r.ok) return;
    const s = await r.json();
    currentSid = sid;

    const area = document.getElementById('messages');
    area.innerHTML = '';

    if (!s.messages || s.messages.length === 0) {
      showWelcome();
    } else {
      for (const m of s.messages) appendMsg(m.role, m.content, m._cot || []);
    }

    document.getElementById('chat-title').textContent = s.title || '🔮 The Sacred Oracle';
    await refreshSessions();
  } catch (e) { console.error(e); }
}

async function deleteSession(e, sid) {
  e.stopPropagation();
  await fetch(`${cfg.url}/sessions/${sid}`, { method: 'DELETE' });
  if (currentSid === sid) { currentSid = null; showWelcome(); }
  await refreshSessions();
}

// ── Chat ─────────────────────────────────────────────────────────────────────
const STARTERS = [
  ['🗺️ Débuter',  'Je suis tout nouveau sur Dofus. Par où commencer et quelle classe choisir ?'],
  ['⚔️ Combat',   'Explique-moi les mécaniques de combat : PA, PM, portée, défis de combat.'],
  ['🏰 Donjons',  'Comment fonctionne un donjon ? Comment se préparer et quoi apporter ?'],
  ['💰 Kamas',    'Quelles sont les meilleures façons de gagner des kamas quand on débute ?'],
  ['🌍 Histoire', 'Raconte-moi le lore de Dofus : Ogrest, le Monde des Douze, les Dofus primaires.'],
  ['🎭 Classe',   'Quelles sont toutes les classes disponibles et leurs rôles en groupe ?'],
];

function showWelcome() {
  document.getElementById('messages').innerHTML = `
    <div id="welcome">
      <h2>🔮 Bienvenue dans les Archives Sacrées</h2>
      <p>L'Oracle répond uniquement depuis ses archives Dofus.<br>
         Soyez précis : classe, niveau, objectif.</p>
      <div class="starters">
        ${STARTERS.map(([l, q]) =>
          `<button class="starter" onclick="injectStarter(${JSON.stringify(q)})">${l}</button>`
        ).join('')}
      </div>
    </div>`;
}

function injectStarter(q) {
  document.getElementById('msg-input').value = q;
  send();
}

async function send() {
  if (busy) return;
  const inp  = document.getElementById('msg-input');
  const text = inp.value.trim();
  if (!text) return;

  inp.value = ''; autoResize(inp);
  document.getElementById('welcome')?.remove();
  appendMsg('user', text, []);

  const tid = 'typing_' + Date.now();
  appendTyping(tid);
  busy = true;
  document.getElementById('send-btn').disabled = true;

  try {
    const r = await fetch(`${cfg.url}/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        session_id:  currentSid || undefined,
        message:     text,
        provider:    cfg.prov,
        model:       cfg.model || undefined,
        temperature: cfg.temp,
        k_final:     cfg.k,
      }),
    });

    removeEl(tid);

    if (!r.ok) {
      const err = await r.json().catch(() => ({ detail: r.statusText }));
      appendMsg('assistant', `❌ Erreur : ${err.detail || 'Inconnue'}`, []);
    } else {
      const d = await r.json();
      currentSid = d.session_id;
      appendMsg('assistant', d.response, d.cot_results || []);
      document.getElementById('chat-title').textContent = '🔮 The Sacred Oracle';
      await refreshSessions();
    }
  } catch (e) {
    removeEl(tid);
    appendMsg('assistant', `❌ Impossible de joindre le backend.\n${e.message}`, []);
  }

  busy = false;
  document.getElementById('send-btn').disabled = false;
}

function appendMsg(role, content, cot) {
  const area = document.getElementById('messages');
  const div  = document.createElement('div');
  div.className = `msg ${role}`;

  const cotId = 'cot_' + Date.now() + '_' + Math.random().toString(36).slice(2);
  let cotHtml = '';
  if (role === 'assistant' && cot && cot.length > 0) {
    const icons  = { high: '🟢', medium: '🟡', low: '🔴' };
    const labels = { high: 'forte', medium: 'modérée', low: 'faible' };
    const rows = cot.map(r => {
      const preview = r.content.length > 200 ? r.content.slice(0, 200) + '…' : r.content;
      return `<div class="cot-src">
        <span class="conf-${r.confidence}">${icons[r.confidence] || '⚪'}</span>
        <strong>${esc(r.source)}</strong>
        — correspondance ${labels[r.confidence] || '?'} · score <code>${r.rrf_score}</code>
        <div style="margin-top:0.25rem">${esc(preview)}</div>
      </div>`;
    }).join('');
    cotHtml = `
      <button class="cot-toggle" onclick="toggleCot('${cotId}')">
        🔍 ${cot.length} source(s) consultée(s)
      </button>
      <div class="cot-panel" id="${cotId}">${rows}</div>`;
  }

  div.innerHTML = `<div class="bubble">${esc(content)}</div>${cotHtml}`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function appendTyping(id) {
  const area = document.getElementById('messages');
  const div  = document.createElement('div');
  div.id = id;
  div.className = 'msg assistant';
  div.innerHTML = '<div class="bubble typing">L\'Oracle consulte les astres…</div>';
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function toggleCot(id) {
  document.getElementById(id)?.classList.toggle('open');
}

// ── Utils ────────────────────────────────────────────────────────────────────
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function removeEl(id) {
  document.getElementById(id)?.remove();
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Start ────────────────────────────────────────────────────────────────────
boot();
</script>
</body>
</html>
